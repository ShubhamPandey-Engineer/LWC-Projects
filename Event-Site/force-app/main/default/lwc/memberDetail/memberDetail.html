<template>

    <!-- Code for modal -->
<template if:true={showModal}>
    <section role="dialog" tabindex="-1" aria-labelledby="Modal"  aria-modal="true" aria-describedby="modal-content" class=" slds-modal slds-fade-in-open slds-modal_large c_partner_info_modal">
    <div class=" slds-modal__container c__modalContainer card-container">
        <header class="slds-modal__header">
            <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModal}>
                <lightning-icon icon-name="utility:close" alternative-text="Close" title="Close" variant="inverse" size="medium"></lightning-icon>
                <span class="slds-assistive-text">Close</span>
            </button>
            <h2 class="slds-text-heading_medium slds-hyphenate c__fontWeightTitle">Member Detail</h2>
        </header>
        <div class="c__modalvisible slds-modal__content slds-p-around_medium" id="modal-content">

            <div class="slds-grid slds-wrap">
       
                <!-- first row-->
                <div class="slds-col slds-size_12-of-12 outer-container">
                    <div class="slds-grid slds-wrap ">
                        <div class="slds-col slds-size_12-of-12 slds-medium-size_4-of-12 detail-container">
                            <img  class="card-img" alt="img"  src={displayuserImage}>


</div>
<div class="slds-col slds-size_12-of-12 slds-medium-size_6-of-12  detail-container">
    <span class="slds-grid"><h4 class="member-label">Name :</h4>

        <div class="label-value card-text  pl-m header-text" >{memberInfo.Name}</div></span>

   
    <span class="slds-grid"><h4 class="member-label">Email :</h4>

        <div class="label-value pl-m header-text" >{memberInfo.Email}</div></span>

    <span class="slds-grid "><h4 class="member-label">Phone :</h4>

    <div class="label-value pl-m header-text" >{memberInfo.Phone}</div></span>
</div>
</div>
</div>


        <div class="slds-col slds-size_12-of-12 slds-medium-size_4-of-12  slds-p-around_small detail-container outer-container">
            <h4 class="member-label">BirthDate</h4>
            <div class="label-value" >{getBirthDate}</div>
        </div>
        <div class="slds-col slds-size_12-of-12 slds-medium-size_4-of-12 slds-p-around_small ">
            <h4 class="member-label">Engagement Date</h4>
            <div class="label-value" >{getEngagementDate}</div>
        </div>
        <div class="slds-col slds-size_12-of-12 slds-medium-size_4-of-12 slds-p-around_small ">
            <h4 class="member-label">Marriage Date</h4>
            <div class="label-value" >{getMarriageAniversaryDate}</div>
        </div>


        <div class="slds-col slds-size_12-of-12 slds-medium-size_4-of-12 detail-container outer-container slds-p-around_small">
            <h4 class="member-label">Date of Joining</h4>
            <div class="label-value" >{getJoiningDate}</div>
        </div>
        <div class="slds-col slds-size_12-of-12 slds-medium-size_4-of-12 slds-p-around_small ">
            <h4 class="member-label">Board</h4>
            <div class="label-value" >{memberInfo.Board__c}</div>
        </div>
        <div class="slds-col slds-size_12-of-12 slds-medium-size_4-of-12 slds-p-around_small">
            <h4 class="member-label">Employee ID</h4>
            <div class="label-value" >{memberInfo.Employee_ID__c}</div>
        </div>
        <div class="slds-col slds-size_12-of-12 slds-medium-size_4-of-12  slds-p-around_small outer-container">
            <h4 class="member-label">Laptop Number</h4>
              <div class="label-value" >{memberInfo.Laptop_Number__c}</div>
        </div>



        
<!-- mailing address-->


<div class="slds-col slds-size_12-of-12 slds-medium-size_12-of-12 outer-container  slds-p-around_small">
    <h4 class="member-label">Address</h4>
    <div class="slds-grid slds-wrap">

    <div class="slds-col slds-size_12-of-12 slds-medium-size_4-of-12 detail-container slds-p-around_small">

    <h4>Street</h4>
    <div class="label-value">{memberInfo.MailingStreet}
   </div>


</div>




<div class="slds-col slds-size_12-of-12 slds-medium-size_4-of-12 detail-container slds-p-around_small">

<h4>City</h4>
<div class="label-value">{memberInfo.MailingCity}
</div>


</div>



<div class="slds-col slds-size_12-of-12 slds-medium-size_4-of-12 detail-container slds-p-around_small">

    <h4>Postal Code</h4>
    <div class="label-value">{memberInfo.MailingPostalCode}
    </div>
    
    
    </div>


<div class="slds-col slds-size_12-of-12 slds-medium-size_4-of-12 detail-container slds-p-around_small">

<h4>State</h4>
<div class="label-value">{memberInfo.MailingState}
</div>


</div>



<div class="slds-col slds-size_12-of-12 slds-medium-size_4-of-12 detail-container slds-p-around_small">

    <h4>Country</h4>
    <div class="label-value">{memberInfo.MailingCountry}
    </div>
    
    
    </div>
</div>
   
<!-- card footer-->
<div class="slds-grid slds-wrap slds-grid_align-center card-footer" >
    <lightning-button class="slds-m-around_small form-btn"  label="Cancel"  onclick={closeModal}></lightning-button>
   
</div>

</div>

            </div>


            
            <template if:true={isloading}>
                <div class="slds-is-relative">
                    <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                </div>
            </template>
          
        </div>
    </div>
</section>
<div class="slds-backdrop slds-backdrop_open"></div>
</template>
</template>
