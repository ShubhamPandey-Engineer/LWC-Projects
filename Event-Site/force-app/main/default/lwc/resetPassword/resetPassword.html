<template>
    
    <lightning-layout    horizontal-align="center" multiple-rows="true">

      <!-- min. size modal container-->
        <lightning-layout-item  class="forgot-password_container" size="12" medium-device-size="4" >

            <lightning-layout-item  class="cancel-modal" size="2"  >
                <lightning-button variant="error" class="btn" label="X" onclick={closeModal} ></lightning-button>
    </lightning-layout-item>


        <!-- send Vc row starts-->


<section if:true={sendCodeCont} class="send-vc">
    <lightning-layout multiple-rows="true" horizontal-align="center">

        <lightning-layout-item size="12" padding="around-small" >  
            <lightning-input name="email" type="email"  placeholder="Enter your work email address"  label="Email" onchange={setEmail}></lightning-input>
            </lightning-layout-item>

<lightning-layout-item  size="12" class="slds-align_absolute-center" padding="around-small"  >  
<lightning-button  variant="brand" disabled={inputProperty.disableSendBtn}   title="verify your email id" label={inputProperty.sendCodeBtnLabel} onclick={sendVerificationCode} ></lightning-button>
</lightning-layout-item>

</lightning-layout>
</section>

<!-- send  vc row ends-->


<!--check VC -->
<section if:true={checkCodeCont} class="check-code">

    <lightning-layout multiple-rows="true" horizontal-align="center">
        <lightning-layout-item  size="12" padding="around-small" >  
       <lightning-input name="code" type="text"  max-length="6" message-when-value-missing="Please enter the verification code" placeholder="Enter the verification code"  label="code" onchange={setCode}></lightning-input>
       <label class="label-error" if:true={vcError}>Incorrect  verification code.Try again.</label>
       </lightning-layout-item>
       
       <lightning-layout-item  class="slds-align_absolute-center" size="12" padding="around-small" >  
       <lightning-button  variant="brand"  title="Confirm the verification code" label="Confirm" onclick={checkVerificationCode} ></lightning-button>
       </lightning-layout-item>
       </lightning-layout>
       
       </section>
       



<!--change password-->

<section if:true={changePasswordCont} class="change-password">
<lightning-layout multiple-rows="true" horizontal-align="center">
    
 <lightning-layout-item size="12"  padding="around-small" >  
    <lightning-input name="password" type="password"  placeholder="Enter your new password"  label="Enter your new password" onchange={setPassword}></lightning-input>
    
    </lightning-layout-item>
    
    <lightning-layout-item   size="12" padding="around-small" >  
        <lightning-input  type="password" name="cpassword"  placeholder="Confirm your new password"  label="Confirm your new password" onchange={setConfirmPassword}></lightning-input>
        
    </lightning-layout-item>
    
    <label class="label-error" if:true={passwordLabelError}>Please enter a password.</label>

   <lightning-layout-item  class="slds-align_absolute-center" size="12"  padding="around-small" >  
   <lightning-button  variant="brand"  disabled={inputProperty.disableChangePasswordBtn}  title="Change Password" label="Change Password" onclick={setNewPassword} ></lightning-button>
   </lightning-layout-item>


   </lightning-layout>
   </section>



</lightning-layout-item>
</lightning-layout>
</template>
