    <div>
        <div>
        <label>Maximun Image size limit : 100 kb </label>

            </div>

        <div class="" if:false={imgCompressed}>

        </div>
        <div  class="profile-img_preview">
            <label>Image Preview</label>
        <img  src={userImage}  class="card-img" alt="user image">
        </div>
        <div>
            <label class="file-error" if:true={showError}>Please upload a image file</label>
            </div>
       
{url}

    </div><br/>
